<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar Sid</title>
    <link rel="stylesheet" href="src/styles.css" />
    <link rel="stylesheet" href="src/newtab.css" />
  </head>
  <body>
    <main class="newtab">
      <header class="nt-header">
        <div id="dayDate" class="nt-day" aria-label="Today"></div>
      </header>

      <section class="planner nt-planner">
        <div class="planner-col">
          <ul id="scheduleList" class="tile-list"></ul>
          <input
            id="scheduleInput"
            class="tile-input"
            type="text"
            placeholder="Schedule&hellip;"
            autocomplete="off"
            aria-label="Add to schedule"
          />
        </div>
        <div class="planner-col">
          <input
            id="dayThemeInput"
            class="day-theme"
            type="text"
            placeholder="Theme"
            autocomplete="off"
            aria-label="Theme"
          />
          <ul id="taskList" class="tile-list"></ul>
          <input
            id="taskInput"
            class="tile-input"
            type="text"
            placeholder="Task&hellip;"
            autocomplete="off"
            aria-label="Add a task"
          />
        </div>
      </section>

      <section class="distractions nt-distractions">
        <input
          id="distractionInput"
          class="distraction-box"
          type="text"
          placeholder="Distractions&hellip;"
          autocomplete="off"
          aria-label="Add a distraction"
        />
        <ul id="distractionList" class="distraction-list"></ul>
      </section>
    </main>

    <script type="module" src="src/newtab.js"></script>
  </body>
</html>
