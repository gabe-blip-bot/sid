<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar Sid</title>
    <link rel="stylesheet" href="src/styles.css" />
    <link rel="stylesheet" href="src/newtab.css" />
  </head>
  <body>
    <main class="newtab">
      <header class="nt-header">
        <div id="dayDate" class="nt-day" aria-label="Today"></div>
      </header>

      <div class="nt-grid">
        <section id="scheduleSection" class="notes nt-module">
          <div class="nt-col-label">Schedule</div>
          <ul id="scheduleList" class="note-list">
            <li id="scheduleComposeItem" class="note-compose-item">
              <input
                id="scheduleComposeRow"
                class="tile-input"
                type="text"
                placeholder="Schedule&hellip;"
                autocomplete="off"
                aria-label="Add to schedule"
              />
            </li>
          </ul>
        </section>

        <section id="taskSection" class="notes nt-module">
          <div class="nt-col-label">Tasks</div>
          <ul id="taskList" class="note-list">
            <li id="taskComposeItem" class="note-compose-item">
              <input
                id="taskComposeRow"
                class="tile-input"
                type="text"
                placeholder="Task&hellip;"
                autocomplete="off"
                aria-label="Add a task"
              />
            </li>
          </ul>
        </section>

        <section id="scratchpadSection" class="notes nt-module">
          <div class="nt-col-label">Scratchpad</div>
          <ul id="scratchpadList" class="note-list">
            <li id="scratchpadComposeItem" class="note-compose-item">
              <textarea
                id="scratchpadComposeRow"
                class="note-composer"
                rows="1"
                placeholder="Notes&hellip;"
                aria-label="Scratchpad"
              ></textarea>
            </li>
          </ul>
        </section>

        <section id="distractionSection" class="notes nt-module">
          <div class="nt-col-label">Distractions</div>
          <ul id="distractionList" class="note-list">
            <li id="distractionComposeItem" class="note-compose-item">
              <input
                id="distractionComposeRow"
                class="tile-input"
                type="text"
                placeholder="Distractions&hellip;"
                autocomplete="off"
                aria-label="Add a distraction"
              />
            </li>
          </ul>
        </section>

        <section id="projectsSection" class="notes nt-module" hidden>
          <div class="nt-col-label" id="projectsSummary">Projects</div>
          <ul id="projectsList" class="removed-list"></ul>
        </section>
      </div>

      <details id="backupsSection" class="removed nt-util" hidden>
        <summary id="backupsSummary">Backups</summary>
        <ul id="backupsList" class="removed-list"></ul>
      </details>
    </main>

    <script type="module" src="src/newtab.js"></script>
  </body>
</html>
