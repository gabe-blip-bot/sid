<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar Sid</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="window-panel">
      <header class="topbar">
        <div class="project-bar">
          <div class="combobox" id="comboWrap">
            <input
              id="projectInput"
              class="input project"
              type="text"
              role="combobox"
              aria-expanded="false"
              aria-controls="projectListbox"
              aria-autocomplete="list"
              aria-haspopup="listbox"
              autocomplete="off"
              placeholder="Project"
              aria-label="Project"
            />
            <ul id="projectListbox" class="listbox" role="listbox" hidden></ul>
          </div>
          <input
            id="renameInput"
            class="input project rename-input"
            type="text"
            autocomplete="off"
            aria-label="Rename project"
            hidden
          />
          <button
            id="saveProjectButton"
            class="icon-button"
            type="button"
            title="Save project tabs"
            aria-label="Save project tabs"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <path d="M17 21v-8H7v8" />
              <path d="M7 3v5h8" />
            </svg>
          </button>
          <button
            id="renameButton"
            class="icon-button"
            type="button"
            title="Rename project"
            aria-label="Rename project"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 20h4L19 9a2 2 0 0 0-3-3L5 16v4z" />
              <path d="M14 7l3 3" />
            </svg>
          </button>
          <button
            id="archiveButton"
            class="icon-button"
            type="button"
            title="Archive project"
            aria-label="Archive project"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="4" rx="1" />
              <path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8" />
              <path d="M10 12h4" />
            </svg>
          </button>
        </div>
      </header>

      <details id="removedSection" class="removed" hidden>
        <summary id="removedSummary">Removed Tabs</summary>
        <ul id="removedList" class="removed-list"></ul>
      </details>

      <section class="notes">
        <ul id="noteList" class="note-list">
          <li id="noteComposeItem" class="note-compose-item">
            <textarea
              id="noteComposeRow"
              class="note-composer"
              rows="1"
              placeholder="Take a note"
              aria-label="Take a note"
            ></textarea>
          </li>
        </ul>
        <div class="note-toolbar">
          <button id="copyAllButton" class="note-btn" type="button" title="Copy all" aria-label="Copy all">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 9h11v11H9z" /><path d="M5 15H4V4h11v1" />
            </svg>
          </button>
          <button id="completeAllButton" class="note-btn" type="button" title="Complete all" aria-label="Complete all">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 11l3 3L22 4" />
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
            </svg>
          </button>
        </div>
      </section>
      </div>

      <div class="chrome-panel">
      <section class="planner">
        <div class="planner-col">
          <div id="dayDate" class="col-head" aria-label="Today"></div>
          <ul id="scheduleList" class="tile-list"></ul>
          <input
            id="scheduleInput"
            class="tile-input"
            type="text"
            placeholder="Schedule&hellip;"
            autocomplete="off"
            aria-label="Add to schedule"
          />
        </div>
        <div class="planner-col">
          <input id="dayThemeInput" class="day-theme" type="text" placeholder="Theme"
            autocomplete="off" aria-label="Day theme" />
          <ul id="taskList" class="tile-list"></ul>
          <input
            id="taskInput"
            class="tile-input"
            type="text"
            placeholder="Task&hellip;"
            autocomplete="off"
            aria-label="Add a task"
          />
        </div>
      </section>

      <section class="distractions">
        <div class="distraction-bar">
          <input
            id="distractionInput"
            class="distraction-box"
            type="text"
            placeholder="Distraction&hellip;"
            autocomplete="off"
            aria-label="Add a distraction"
          />
          <button
            id="distractionToggle"
            class="distraction-toggle"
            type="button"
            title="Show distractions"
            aria-label="Show distractions"
            aria-expanded="false"
            hidden
          >
            <span id="distractionCount" class="distraction-count">0</span>
            <svg class="chev" viewBox="0 0 24 24" width="14" height="14" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" aria-hidden="true">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>
        </div>
        <ul id="distractionList" class="distraction-list" hidden></ul>
      </section>
      </div>
    </main>

    <script type="module" src="src/ui.js"></script>
  </body>
</html>
