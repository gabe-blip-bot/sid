<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar Sid</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <select id="projectSwitch" class="select" aria-label="Switch project"></select>
        <input
          id="projectName"
          class="input project"
          type="text"
          placeholder="Project name"
          autocomplete="off"
          aria-label="Project name"
        />
      </header>

      <section class="field-group grow">
        <textarea id="notesInput" class="textarea" placeholder="Notes"></textarea>
      </section>

      <section class="field-group grow">
        <textarea
          id="scratchpadInput"
          class="textarea"
          placeholder="Scratchpad &mdash; shared across every window"
        ></textarea>
      </section>

      <section class="workspace">
        <span id="lastSaved" class="status">Not saved yet</span>
        <div class="workspace-actions">
          <button id="saveProjectButton" class="primary small" type="button">Save Project</button>
          <button id="openProjectButton" class="small" type="button">Open Project</button>
        </div>
      </section>

      <details id="removedSection" class="removed" hidden>
        <summary id="removedSummary">Removed Tabs</summary>
        <ul id="removedList" class="removed-list"></ul>
      </details>

      <footer class="footer">
        <button id="exportButton" type="button">Export Markdown</button>
      </footer>
    </main>

    <script type="module" src="src/ui.js"></script>
  </body>
</html>
