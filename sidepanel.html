<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar Sid</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="project-bar">
          <div class="combobox" id="comboWrap">
            <input
              id="projectInput"
              class="input project"
              type="text"
              role="combobox"
              aria-expanded="false"
              aria-controls="projectListbox"
              aria-autocomplete="list"
              aria-haspopup="listbox"
              autocomplete="off"
              placeholder="Project"
              aria-label="Project"
            />
            <ul id="projectListbox" class="listbox" role="listbox" hidden></ul>
          </div>
          <input
            id="renameInput"
            class="input project rename-input"
            type="text"
            autocomplete="off"
            aria-label="Rename project"
            hidden
          />
          <button
            id="renameButton"
            class="icon-button"
            type="button"
            title="Rename project"
            aria-label="Rename project"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 20h4L19 9a2 2 0 0 0-3-3L5 16v4z" />
              <path d="M14 7l3 3" />
            </svg>
          </button>
          <button
            id="archiveButton"
            class="icon-button"
            type="button"
            title="Archive project"
            aria-label="Archive project"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="4" rx="1" />
              <path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8" />
              <path d="M10 12h4" />
            </svg>
          </button>
        </div>
      </header>

      <section class="field-group grow">
        <textarea id="notesInput" class="textarea" placeholder="Notes"></textarea>
      </section>

      <section class="field-group grow">
        <textarea
          id="scratchpadInput"
          class="textarea"
          placeholder="Scratchpad &mdash; shared across every window"
        ></textarea>
      </section>

      <section class="workspace">
        <span id="lastSaved" class="status">Not saved yet</span>
        <div class="workspace-actions">
          <button id="saveProjectButton" class="primary small" type="button">Save Project</button>
          <button id="openProjectButton" class="small" type="button">Open Project</button>
        </div>
      </section>

      <details id="removedSection" class="removed" hidden>
        <summary id="removedSummary">Removed Tabs</summary>
        <ul id="removedList" class="removed-list"></ul>
      </details>

      <details id="archivedSection" class="archived" hidden>
        <summary id="archivedSummary">Archived projects</summary>
        <ul id="archivedList" class="archived-list"></ul>
      </details>
    </main>

    <script type="module" src="src/ui.js"></script>
  </body>
</html>
