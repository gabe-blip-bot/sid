<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar Sid</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="project-bar">
          <div class="combobox" id="comboWrap">
            <input
              id="projectInput"
              class="input project"
              type="text"
              role="combobox"
              aria-expanded="false"
              aria-controls="projectListbox"
              aria-autocomplete="list"
              aria-haspopup="listbox"
              autocomplete="off"
              placeholder="Project"
              aria-label="Project"
            />
            <ul id="projectListbox" class="listbox" role="listbox" hidden></ul>
          </div>
          <input
            id="renameInput"
            class="input project rename-input"
            type="text"
            autocomplete="off"
            aria-label="Rename project"
            hidden
          />
          <button
            id="saveProjectButton"
            class="icon-button"
            type="button"
            title="Save project tabs"
            aria-label="Save project tabs"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
              <path d="M17 21v-8H7v8" />
              <path d="M7 3v5h8" />
            </svg>
          </button>
          <button
            id="renameButton"
            class="icon-button"
            type="button"
            title="Rename project"
            aria-label="Rename project"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 20h4L19 9a2 2 0 0 0-3-3L5 16v4z" />
              <path d="M14 7l3 3" />
            </svg>
          </button>
          <button
            id="archiveButton"
            class="icon-button"
            type="button"
            title="Archive project"
            aria-label="Archive project"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="4" rx="1" />
              <path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8" />
              <path d="M10 12h4" />
            </svg>
          </button>
        </div>
      </header>

      <section class="notes">
        <input
          id="noteInput"
          class="input"
          type="text"
          placeholder="Add a note"
          autocomplete="off"
          aria-label="Add a note"
        />
        <div class="note-toolbar">
          <button id="copyAllButton" class="small" type="button">Copy all</button>
          <button id="completeAllButton" class="small" type="button">Complete all</button>
        </div>
        <ul id="noteList" class="note-list"></ul>
      </section>

      <section class="week-strip" aria-label="Week themes">
        <div class="day-row" id="day-mon" data-day="mon">
          <span class="day-label">Mon</span>
          <input id="theme-mon" class="day-theme" type="text" placeholder="Theme"
            autocomplete="off" aria-label="Monday theme" />
        </div>
        <div class="day-row" id="day-tue" data-day="tue">
          <span class="day-label">Tue</span>
          <input id="theme-tue" class="day-theme" type="text" placeholder="Theme"
            autocomplete="off" aria-label="Tuesday theme" />
        </div>
        <div class="day-row" id="day-wed" data-day="wed">
          <span class="day-label">Wed</span>
          <input id="theme-wed" class="day-theme" type="text" placeholder="Theme"
            autocomplete="off" aria-label="Wednesday theme" />
        </div>
        <div class="day-row" id="day-thu" data-day="thu">
          <span class="day-label">Thu</span>
          <input id="theme-thu" class="day-theme" type="text" placeholder="Theme"
            autocomplete="off" aria-label="Thursday theme" />
        </div>
      </section>

      <section class="field-group">
        <textarea
          id="scratchpadInput"
          class="textarea"
          rows="1"
          placeholder="Scratchpad &mdash; shared across every window"
        ></textarea>
      </section>

      <details id="removedSection" class="removed" hidden>
        <summary id="removedSummary">Removed Tabs</summary>
        <ul id="removedList" class="removed-list"></ul>
      </details>

      <span id="lastSaved" class="status saved-line"></span>
    </main>

    <script type="module" src="src/ui.js"></script>
  </body>
</html>
