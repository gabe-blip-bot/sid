<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sidebar Sid</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="window-panel">
      <header class="topbar">
        <div class="project-bar">
          <div class="combobox" id="comboWrap">
            <input
              id="projectInput"
              class="input project"
              type="text"
              role="combobox"
              aria-expanded="false"
              aria-controls="projectListbox"
              aria-autocomplete="list"
              aria-haspopup="listbox"
              autocomplete="off"
              placeholder="Project"
              aria-label="Project"
            />
            <ul id="projectListbox" class="listbox" role="listbox" hidden></ul>
          </div>
          <input
            id="renameInput"
            class="input project rename-input"
            type="text"
            autocomplete="off"
            aria-label="Rename project"
            hidden
          />
          <button
            id="renameButton"
            class="icon-button"
            type="button"
            title="Rename project"
            aria-label="Rename project"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 20h4L19 9a2 2 0 0 0-3-3L5 16v4z" />
              <path d="M14 7l3 3" />
            </svg>
          </button>
          <button
            id="archiveButton"
            class="icon-button"
            type="button"
            title="Archive project"
            aria-label="Archive project"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="4" rx="1" />
              <path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8" />
              <path d="M10 12h4" />
            </svg>
          </button>

          <span class="bar-divider" aria-hidden="true"></span>

          <button
            id="undoButton"
            class="icon-button"
            type="button"
            title="Undo last change"
            aria-label="Undo last change"
            disabled
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 14 4 9l5-5" />
              <path d="M4 9h11a5 5 0 0 1 0 10h-1" />
            </svg>
          </button>
          <button
            id="copyAllButton"
            class="icon-button"
            type="button"
            title="Copy all notes"
            aria-label="Copy all notes"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 9h11v11H9z" /><path d="M5 15H4V4h11v1" />
            </svg>
          </button>
          <button
            id="completeAllButton"
            class="icon-button"
            type="button"
            title="Clear all notes"
            aria-label="Clear all notes"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            </svg>
          </button>
        </div>
      </header>

      <section class="notes">
        <ul id="noteList" class="note-list">
          <li id="noteComposeItem" class="note-compose-item">
            <textarea
              id="noteComposeRow"
              class="note-composer"
              rows="1"
              placeholder="Take a note"
              aria-label="Take a note"
            ></textarea>
          </li>
        </ul>
      </section>

      <details id="removedSection" class="removed" hidden>
        <summary id="removedSummary">Removed Tabs</summary>
        <ul id="removedList" class="removed-list"></ul>
      </details>
      </div>

      <div class="chrome-panel">
      <section class="planner">
        <div class="planner-col">
          <div id="dayDate" class="col-head" aria-label="Today"></div>
          <ul id="scheduleList" class="tile-list"></ul>
          <input
            id="scheduleInput"
            class="tile-input"
            type="text"
            placeholder="Schedule&hellip;"
            autocomplete="off"
            aria-label="Add to schedule"
          />
        </div>
        <div class="planner-col">
          <div class="theme-row">
            <input id="dayThemeInput" class="day-theme" type="text" placeholder="Theme"
              autocomplete="off" aria-label="Day theme" />
            <button id="newtabLink" class="newtab-link" type="button"
              title="Open new tab" aria-label="Open new tab">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 3h6v6" />
                <path d="M10 14 21 3" />
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              </svg>
            </button>
          </div>
          <ul id="taskList" class="tile-list"></ul>
          <input
            id="taskInput"
            class="tile-input"
            type="text"
            placeholder="Task&hellip;"
            autocomplete="off"
            aria-label="Add a task"
          />
        </div>
      </section>

      <section class="distractions">
        <input
          id="distractionInput"
          class="distraction-box"
          type="text"
          placeholder="Distractions&hellip;"
          autocomplete="off"
          aria-label="Add a distraction"
        />
      </section>
      </div>
    </main>

    <script type="module" src="src/ui.js"></script>
  </body>
</html>
