<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sid</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <input
          id="projectInput"
          class="input project"
          type="text"
          list="projectList"
          placeholder="Project"
          autocomplete="off"
        />
        <datalist id="projectList"></datalist>
        <div class="meta">
          <span id="windowLabel">Window</span>
          <span class="dot">&middot;</span>
          <span id="saveStatus">Loading</span>
        </div>
      </header>

      <section class="field-group">
        <label class="label" for="objectiveInput">Current objective</label>
        <input
          id="objectiveInput"
          class="input objective"
          type="text"
          placeholder="What are you working on?"
          autocomplete="off"
        />
      </section>

      <section class="field-group grow">
        <label class="label" for="notesInput">Notes</label>
        <textarea id="notesInput" class="textarea" placeholder="Project notes"></textarea>
      </section>

      <section class="field-group grow">
        <label class="label" for="scratchpadInput">Scratchpad</label>
        <textarea
          id="scratchpadInput"
          class="textarea"
          placeholder="Shared across every window"
        ></textarea>
      </section>

      <footer class="footer">
        <button id="exportButton" type="button">Export Markdown</button>
      </footer>
    </main>

    <script type="module" src="src/ui.js"></script>
  </body>
</html>
